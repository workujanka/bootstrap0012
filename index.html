<!DOCTYPE html>
<html>
<head>
    <title>ውብ ምግብ ቤት</title>
    <link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
  rel="stylesheet"
  integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
  crossorigin="anonymous">

    <!-- <link href="bootstrap.min.css" rel="stylesheet"> -->
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h1 style="text-align: center; font-weight: bold; color: rgb(109, 26, 26);">ውብ ምግብ ቤት</h1> 
                <h1 style="text-align: center; font-weight: bold; color: rgb(20, 23, 194);">ያሉን የምግብ አይነቶች </h1>
                <div class="row">
                    <div class="col-12 col-lg-6">
                        <div class="card">
                            <img src="images/tibs.jpg" class="card-img-top"/>
                            <div class="card-body">
                                <h2 class="card-title">ጥብስ <span class="badge bg-primary">አዲስ</span></h2>
                                <p class="card-text">የበግ ሥጋ፣ ቃሪያ፣ ሽንኩርት፣ የጥብስ ቅጠል፣ ቲማቲም፣ አዋዜ፣ በእንጀራ</p>

                            </div>
                                

                        </div>


                    </div>
                    <div class="col-12 col-lg-6">
                        <div class="card">
                            <img src="images/sheklatibs.jpg" class="card-img-top"/>
                            <div class="card-body">
                                <h2 class="card-title">የሸክላ ጥብስ (ሩብ ኪሎ)</h2>
                                <p class="card-text">የበሬ ሥጋ፣ ቃሪያ፣ ሽንኩርት፣ የጥብስ ቅጠል፣ ቲማቲም፣ አዋዜ፣ በእንጀራ</p>     
                            </div>
                            
                        </div>
                        
                    </div>
                    <div class="col-12 col-lg-6">
                        <div class="card">
                            <img src="images/beyaynet.jpg" class="card-img-top"/>
                            <div class="card-body">
                                <h2 class="card-title">በያይነት</h2>
                                <p class="card-text">የተለያዩ የፍስክ ወጦች በእንጀራ</p> 
                                
                            </div>
                            
                        </div>
                        
                    </div>
                </div>
            
            </div>

            <div class="col-12 col-lg-6">
                
                <table class="table">
                    <thead>
                        <tr>
                            <th>የምግብ አይነት</th>
                            <th>ዋጋ</th>
                        </tr>
                    </thead>
                    <tr>
                        <td>ጥብስ</td>
                        <td>600 ብር</td>
                    </tr>
                    <tr>
                        <td>የሸክላ ጥብስ (ሩብ ኪሎ)</td>
                        <td>700 ብር</td>
                    </tr>
                    <tr>
                        <td>በያይነት</td>
                        <td>300 ብር</td>
                    </tr>
                </table>
                <div class="alert alert-info">
                    አዲሱን ጥብስ ይሞክሩ!
            </div>
        
        </div>

    </div>

    <script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
  crossorigin="anonymous">
</script>
    <!-- <script src="bootstrap.bundle.min.js"></script> -->
</body>
</html>
